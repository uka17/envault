info:
  name: Create new stash
  type: http
  seq: 1
  tags:
    - Stash

http:
  method: POST
  url: "{{baseUrl}}/api/v1/stashes"
  body:
    type: json
    data: |-
      {
        "body": "Secret message to deliver",
        "to": "journalist@fakemail.com",
        "sendAt": "2025-12-31T23:59:59Z"
      }
  auth:
    type: bearer
    token: "{{accessToken}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 201 Response
    description: Stash created successfully
    request:
      url: "{{baseUrl}}/api/v1/stashes"
      method: POST
      body:
        type: json
        data: |-
          {
            "body": "Secret message to deliver",
            "to": "journalist@fakemail.com",
            "sendAt": "2025-12-31T23:59:59Z"
          }
    response:
      status: 201
      statusText: Created
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "id": 42,
            "to": "journalist@fakemail.com",
            "body": "<encrypted>",
            "key": "abc123xyz",
            "isSent": false,
            "sendAt": "2025-12-31T23:59:59Z",
            "createdOn": "2025-01-01T00:00:00Z",
            "modifiedOn": "2025-01-01T00:00:00Z"
          }
  - name: 201 Response
    description: Stash created successfully
    request:
      url: "{{baseUrl}}/api/v1/stashes"
      method: POST
      body:
        type: json
        data: |-
