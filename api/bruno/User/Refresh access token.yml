info:
  name: Refresh access token
  type: http
  seq: 4
  tags:
    - User

http:
  method: POST
  url: "{{baseUrl}}/api/v1/token/refresh"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: New access token
    request:
      url: "{{baseUrl}}/api/v1/token/refresh"
      method: POST
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "token": "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
          }
  - name: 200 Response
    description: New access token
    request:
      url: "{{baseUrl}}/api/v1/token/refresh"
      method: POST
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/xml
      body:
        type: xml
        data: |-
          <?xml version="1.0" encoding="UTF-8"?>
          <root>
            <token>eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...</token>
          </root>
  - name: 401 Response
    description: Missing or invalid refresh token
    request:
      url: "{{baseUrl}}/api/v1/token/refresh"
      method: POST
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "error": "Unauthorized"
          }
  - name: 401 Response
    description: Missing or invalid refresh token
    request:
      url: "{{baseUrl}}/api/v1/token/refresh"
      method: POST
    response:
      status: 401
      statusText: Unauthorized
      headers:
        - name: Content-Type
          value: application/xml
      body:
        type: xml
        data: |-
          <?xml version="1.0" encoding="UTF-8"?>
          <root>
            <error>Unauthorized</error>
          </root>

docs: Issues a new short-lived access token using the refresh token stored in the HttpOnly cookie. Also rotates the refresh token.
