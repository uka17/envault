info:
  name: Change user password
  type: http
  seq: 6
  tags:
    - User

http:
  method: PATCH
  url: "{{baseUrl}}/api/v1/users/me/password"
  auth:
    type: bearer
    token: "{{accessToken}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Password changed successfully
    request:
      url: "{{baseUrl}}/api/v1/users/me/password"
      method: PATCH
    response:
      status: 200
      statusText: OK
      body:
        type: text
        data: ""
  - name: 422 Response
    description: Validation error or incorrect current password
    request:
      url: "{{baseUrl}}/api/v1/users/me/password"
      method: PATCH
    response:
      status: 422
      statusText: Unprocessable Entity
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "errors": [
              {
                "field": "email",
                "message": "must be a valid email"
              }
            ]
          }
  - name: 422 Response
    description: Validation error or incorrect current password
    request:
      url: "{{baseUrl}}/api/v1/users/me/password"
      method: PATCH
    response:
      status: 422
      statusText: Unprocessable Entity
      headers:
        - name: Content-Type
          value: application/xml
      body:
        type: xml
        data: |-
          <?xml version="1.0" encoding="UTF-8"?>
          <root>
            <errors>[object Object]</errors>
          </root>
