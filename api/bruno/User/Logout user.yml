info:
  name: Logout user
  type: http
  seq: 7
  tags:
    - User

http:
  method: POST
  url: "{{baseUrl}}/api/v1/users/logout"
  auth:
    type: bearer
    token: "{{accessToken}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Logout successful
    request:
      url: "{{baseUrl}}/api/v1/users/logout"
      method: POST
    response:
      status: 200
      statusText: OK
      body:
        type: text
        data: ""

docs: Revokes the refresh token and clears the cookie. Requires a valid access token.
